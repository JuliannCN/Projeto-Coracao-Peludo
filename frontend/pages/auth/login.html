<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Coração Peludo</title>
  <link rel="stylesheet" href="auth.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body>

<div class="auth-container">
  <div class="auth-card">

    <h2>🐾 Bem-vindo de volta</h2>
    <p>Entre para continuar espalhando amor.</p>

    <form onsubmit="loginUser(event)", id="loginForm">
      <div class="input-group">
        <label>Email</label>
        <input type="email" required>
      </div>

      <div class="input-group">
        <label>Senha</label>
        <input type="password" required>
      </div>

      <button type="submit" class="btn-primary">Entrar</button>
    </form>

    <div class="auth-footer">
      <p>Não possui conta?
        <a href="register.html">Cadastre-se</a>
      </p>
      <a href="../home/index.html" class="back-home">← Voltar para Home</a>
    </div>

  </div>
</div>

<script src="auth.js"></script>
</body>
</html>
